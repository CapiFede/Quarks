name: quarks
description: "Quarks - minimalist modular app launcher."
publish_to: none
version: 2.2.1
environment:
  sdk: ^3.10.0

workspace:
  - packages/quark_core
  - packages/quark_music
  - packages/quark_notes
  - packages/quark_calendar
  - packages/quark_console
  - packages/quark_books
  - packages/quark_settings

dependencies:
  flutter:
    sdk: flutter
  quark_core:
  quark_music:
  quark_notes:
  quark_calendar:
  quark_console:
  quark_books:
  quark_settings:
  flutter_riverpod: ^2.6.1
  google_fonts: ^6.2.1
  window_manager: ^0.4.3
  auto_updater: ^1.0.0
  package_info_plus: ^9.0.0
  launch_at_startup: ^0.5.1
  path: ^1.9.0
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# Vendored + patched packages:
# - flutter_pty: Windows command-line builder duplicated the executable
#   (pwsh exited with code 64). See vendor/flutter_pty/src/flutter_pty_win.c.
# - xterm: TextInputConfiguration didn't pass viewId, breaking text input
#   app-wide on Flutter 3.27+. See vendor/xterm/lib/src/ui/custom_text_edit.dart.
dependency_overrides:
  flutter_pty:
    path: vendor/flutter_pty
  xterm:
    path: vendor/xterm
  just_audio_media_kit:
    path: vendor/just_audio_media_kit

flutter:
  uses-material-design: true
