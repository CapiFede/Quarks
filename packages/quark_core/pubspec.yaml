name: quark_core
description: "Core package for Quarks - shared interface, theme, and widgets."
version: 0.1.0
publish_to: none

environment:
  sdk: ^3.10.0
  flutter: ">=3.38.0"

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  google_fonts: ^6.2.1
  path: ^1.9.0
  path_provider: ^2.1.5
  # AI chat layer (used by quark_core/lib/ai/)
  anthropic_sdk_dart: ^2.2.0
  google_generative_ai: ^0.4.7
  flutter_markdown_plus: ^1.0.7
  flutter_secure_storage: ^9.2.2
  http: ^1.2.0
  crypto: ^3.0.5
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
