name: quark_books
description: "Quark Books - minimalist books editor module for Quarks."
version: 0.1.0
publish_to: none

environment:
  sdk: ^3.10.0
  flutter: ">=3.38.0"

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  quark_core:
  flutter_riverpod: ^2.6.1
  google_fonts: ^6.2.1
  path_provider: ^2.1.5
  path: ^1.9.0
  pdf: ^3.11.0
  printing: ^5.13.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
