name: quark_music
description: "Quark Music - minimalist music player module for Quarks."
version: 0.1.0
publish_to: none

environment:
  sdk: ^3.10.0
  flutter: ">=3.38.0"

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  quark_core:
  flutter_riverpod: ^2.6.1
  just_audio: ^0.9.43
  just_audio_media_kit: ^2.0.6
  media_kit_libs_audio: ^1.0.5
  path_provider: ^2.1.5
  path: ^1.9.0
  archive: ^4.0.2
  google_sign_in: ^6.2.1
  extension_google_sign_in_as_googleapis_auth: ^2.0.12
  googleapis: ^13.2.0
  googleapis_auth: ^1.6.0
  url_launcher: ^6.3.0
  http: ^1.2.0
  flutter_secure_storage: ^9.2.2
  crypto: ^3.0.5
  wakelock_plus: ^1.3.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
