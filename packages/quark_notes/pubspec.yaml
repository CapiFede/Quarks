name: quark_notes
description: "Quark Notes - minimalist notes module for Quarks."
version: 0.1.0
publish_to: none

environment:
  sdk: ^3.10.0
  flutter: ">=3.38.0"

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  quark_core:
  flutter_riverpod: ^2.6.1
  flutter_quill: ^11.5.0
  path_provider: ^2.1.5
  path: ^1.9.0
  window_manager: ^0.4.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
