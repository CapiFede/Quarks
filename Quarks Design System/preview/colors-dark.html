<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Tiny5&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Tiny5', monospace; background: #1E1F22; padding: 16px; }
.grid { display: flex; flex-wrap: wrap; gap: 8px; }
.swatch { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.color { width: 56px; height: 40px; border: 1.5px solid #3A3B3E; }
.name { font-size: 9px; color: #DCDDDE; text-align: center; max-width: 60px; line-height: 1.3; }
.hex  { font-size: 8px; color: #8E9297; }
</style>
</head>
<body>
<div class="grid">
  <div class="swatch"><div class="color" style="background:#1E1F22"></div><div class="name">background</div><div class="hex">#1E1F22</div></div>
  <div class="swatch"><div class="color" style="background:#2B2D31"></div><div class="name">surface</div><div class="hex">#2B2D31</div></div>
  <div class="swatch"><div class="color" style="background:#313338"></div><div class="name">surfaceAlt</div><div class="hex">#313338</div></div>
  <div class="swatch"><div class="color" style="background:#568070"></div><div class="name">primary</div><div class="hex">#568070</div></div>
  <div class="swatch"><div class="color" style="background:#3E6054"></div><div class="name">primaryDark</div><div class="hex">#3E6054</div></div>
  <div class="swatch"><div class="color" style="background:#72A090"></div><div class="name">primaryLight</div><div class="hex">#72A090</div></div>
  <div class="swatch"><div class="color" style="background:#4A6E5E"></div><div class="name">secondary</div><div class="hex">#4A6E5E</div></div>
  <div class="swatch"><div class="color" style="background:#3A3B3E"></div><div class="name">border</div><div class="hex">#3A3B3E</div></div>
  <div class="swatch"><div class="color" style="background:#2A2B2E"></div><div class="name">borderDark</div><div class="hex">#2A2B2E</div></div>
  <div class="swatch"><div class="color" style="background:#4E4F52"></div><div class="name">borderLight</div><div class="hex">#4E4F52</div></div>
  <div class="swatch"><div class="color" style="background:#DCDDDE"></div><div class="name">textPrimary</div><div class="hex">#DCDDDE</div></div>
  <div class="swatch"><div class="color" style="background:#8E9297"></div><div class="name">textSecond.</div><div class="hex">#8E9297</div></div>
  <div class="swatch"><div class="color" style="background:#5C5E66"></div><div class="name">textLight</div><div class="hex">#5C5E66</div></div>
  <div class="swatch"><div class="color" style="background:#C08080"></div><div class="name">error</div><div class="hex">#C08080</div></div>
  <div class="swatch"><div class="color" style="background:#70A870"></div><div class="name">success</div><div class="hex">#70A870</div></div>
  <div class="swatch"><div class="color" style="background:#35373C"></div><div class="name">cardHover</div><div class="hex">#35373C</div></div>
</div>
</body>
</html>
