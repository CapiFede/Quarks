<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Tiny5&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Tiny5', monospace; background: #F2EDE4; padding: 16px; display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-start; }

.card {
  background: #FAF8F3;
  border: 1px solid #D8D2C8;
  padding: 12px;
  width: 200px;
}
.card-label { font-size: 9px; color: #8A9484; text-transform: uppercase; margin-bottom: 8px; }

/* Track row */
.track-title { font-size: 12px; color: #32382C; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.track-title.playing { color: #568070; }
.track-artist { font-size: 10px; color: #4A5444; margin-top: 3px; }
.track-duration { font-size: 9px; color: #8A9484; margin-top: 2px; }

/* Section header */
.section-header { font-size: 9px; color: #8A9484; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; }

/* Path / metadata */
.path-text { font-size: 9px; color: #8A9484; line-height: 1.6; word-break: break-all; }

/* Empty state */
.empty-state { font-size: 13px; color: #8A9484; line-height: 1.5; }

/* Field label + value */
.field-label { font-size: 9px; color: #8A9484; text-transform: uppercase; }
.field-value { font-size: 12px; color: #32382C; margin-top: 4px; }

/* Drawer title */
.drawer-title { font-size: 13px; color: #32382C; }
</style>
</head>
<body>
  <div class="card">
    <div class="card-label">Track row</div>
    <div class="track-title">Bohemian Rhapsody</div>
    <div class="track-artist">Queen</div>
    <div class="track-duration">05:54</div>
  </div>

  <div class="card">
    <div class="card-label">Track row (playing)</div>
    <div class="track-title playing">Stairway to Heaven</div>
    <div class="track-artist">Led Zeppelin</div>
    <div class="track-duration">08:02</div>
  </div>

  <div class="card">
    <div class="card-label">Empty state</div>
    <div class="empty-state">Scan a folder to find music</div>
  </div>

  <div class="card">
    <div class="card-label">Drawer section</div>
    <div class="section-header">Path</div>
    <div class="path-text">C:\Users\user\Music\rock\queen.mp3</div>
  </div>

  <div class="card">
    <div class="card-label">Field label + value</div>
    <div class="field-label">Duration</div>
    <div class="field-value">05:54</div>
    <div style="margin-top:8px;">
      <div class="field-label">Artist</div>
      <div class="field-value">Queen</div>
    </div>
  </div>

  <div class="card">
    <div class="card-label">Drawer title</div>
    <div class="drawer-title">DOWNLOAD</div>
    <div style="margin-top:8px; font-size:9px; color:#8A9484; text-transform:uppercase; letter-spacing:.06em;">URL</div>
  </div>
</body>
</html>
